<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chess Trainer</title>
    <!-- Apply dark class immediately to avoid flash of light theme -->
    <script>
      (function () {
        var saved = localStorage.getItem("chess-dark-mode");
        var dark = saved !== null ? saved === "true" : true;
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <script>
      var viteBaseUrl = "%BASE_URL%";
      if (
        location.hostname.endsWith("github.io") &&
        viteBaseUrl.charAt(0) === "%"
      ) {
        location.replace("/ai-chess-trainer/site/");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
